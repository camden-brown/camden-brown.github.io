<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- terminal window (Dracula, the default theme) -->
  <rect x="16" y="16" width="480" height="480" rx="104" fill="#282a36"/>
  <rect x="16.5" y="16.5" width="479" height="479" rx="103.5" fill="none" stroke="#383a4a" stroke-width="3"/>
  <!-- prompt chevron  >  -->
  <polyline points="150,168 262,256 150,344" fill="none" stroke="#bd93f9"
            stroke-width="46" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- cursor block -->
  <rect x="300" y="300" width="86" height="52" rx="12" fill="#bd93f9"/>
</svg>
